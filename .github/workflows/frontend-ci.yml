name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "!dashboard/design/**"
  pull_request:
    branches: [main]
    paths:
      - "dashboard/**"
      - "!dashboard/design/**"

jobs:
  lint-and-build:
    name: ESLint + Vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Build
        run: npm run build
